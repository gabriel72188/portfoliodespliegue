apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-gabriel
  namespace: argocd
  annotations:
    # 1. Definimos el alias apuntando a tu Docker Hub
    argocd-image-updater.argoproj.io/image-list: myimg=gabriel72188/portfolio
    # 2. Usamos el MISMO alias para todo
    argocd-image-updater.argoproj.io/myimg.update-strategy: latest
    argocd-image-updater.argoproj.io/myimg.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/myimg.helm.image-tag: image.tag
    # 3. Filtro para que solo use los hashes de Git
    argocd-image-updater.argoproj.io/myimg.allow-tags: regexp:^[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    # TU NUEVO REPOSITORIO DE GITHUB
    repoURL: https://github.com/gabriel72188/portfoliodespliegue.git
    targetRevision: main
    path: deploy/miportfolio
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true